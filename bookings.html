<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Журнал заявок</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .bookings-wrap { padding: 40px 0 70px; }
    .bookings-card {
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      box-shadow: 0 14px 40px rgba(0,0,0,.28);
      padding: 16px;
    }
    .bookings-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 0 0 16px;
    }
    .bookings-table-wrap { overflow: auto; }
    .bookings-table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
    }
    .bookings-table th, .bookings-table td {
      border-bottom: 1px solid rgba(255,255,255,.10);
      padding: 12px;
      text-align: left;
      vertical-align: top;
    }
    .bookings-table th { color: rgba(255,255,255,.75); font-size: 13px; }
    .bookings-table td { color: rgba(255,255,255,.92); }
    .bookings-empty {
      margin: 0;
      color: rgba(255,255,255,.72);
      padding: 10px 2px;
    }
    .file-input { display: none; }
  </style>
</head>
<body>
  <main class="bookings-wrap">
    <div class="container">
      <div class="section-head">
        <p class="section-eyebrow">Админ</p>
        <h2>Журнал заявок</h2>
        <p class="muted">Общий журнал заявок из базы данных.</p>
      </div>

      <div class="bookings-card">
        <div class="bookings-actions">
          <button class="btn btn-primary" type="button" id="refreshBtn">Обновить журнал</button>
        </div>

        <p class="bookings-empty" id="emptyState">Заявок пока нет.</p>

        <div class="bookings-table-wrap">
          <table class="bookings-table" id="bookingsTable" hidden>
            <thead>
              <tr>
                <th>#</th>
                <th>Дата</th>
                <th>Имя</th>
                <th>Телефон</th>
                <th>Услуга</th>
              </tr>
            </thead>
            <tbody id="bookingsBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script>
    (() => {
      const SUPABASE_URL = "https://ecyklezuaezyjwutwfzt.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjeWtsZXp1YWV6eWp3dXR3Znp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1Mjg3MDUsImV4cCI6MjA5MDEwNDcwNX0.O_JObhgX92JSfQanCWOUObHgH-r06U9iWH9rkIHddjM";
      const refreshBtn = document.getElementById("refreshBtn");
      const table = document.getElementById("bookingsTable");
      const body = document.getElementById("bookingsBody");
      const emptyState = document.getElementById("emptyState");

      const fetchBookings = async () => {
        const endpoint =
          `${SUPABASE_URL}/rest/v1/bookings` +
          "?select=id,created_at,name,phone,service&order=created_at.desc";

        const response = await fetch(endpoint, {
          method: "GET",
          headers: {
            apikey: SUPABASE_ANON_KEY,
            Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          },
        });

        if (!response.ok) {
          throw new Error(`Supabase error: ${response.status}`);
        }

        const rows = await response.json();
        return Array.isArray(rows) ? rows : [];
      };

      const render = (rows) => {
        body.innerHTML = "";

        if (!rows.length) {
          table.hidden = true;
          emptyState.hidden = false;
          return;
        }

        rows.forEach((row, idx) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${idx + 1}</td>
            <td>${row.created_at ? new Date(row.created_at).toLocaleString("ru-RU") : "-"}</td>
            <td>${row.name || "-"}</td>
            <td>${row.phone || "-"}</td>
            <td>${row.service || "-"}</td>
          `;
          body.appendChild(tr);
        });

        table.hidden = false;
        emptyState.hidden = true;
      };

      const refresh = async () => {
        try {
          const rows = await fetchBookings();
          render(rows);
        } catch {
          render([]);
          alert("Не удалось загрузить заявки из базы.");
        }
      };

      refreshBtn.addEventListener("click", refresh);
      refresh();
    })();
  </script>
</body>
</html>
